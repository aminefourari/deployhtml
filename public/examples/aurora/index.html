<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aurora — Animated CSS Landing Page</title>
<meta name="description" content="A stunning animated aurora gradient hero page built with pure CSS — no JavaScript, no images.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0612;
    --text: #f0eaf8;
    --muted: rgba(240, 234, 248, 0.6);
    --accent: #a78bfa;
    --accent2: #38bdf8;
    --accent3: #f472b6;
  }

  html, body {
    height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Helvetica, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Aurora background ── */
  .aurora-wrap {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .aurora {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
    filter: blur(60px);
    animation: drift linear infinite;
  }

  .a1 {
    width: 70vw; height: 70vw;
    top: -20%; left: -10%;
    background: radial-gradient(circle at 40% 40%, rgba(167,139,250,.45), transparent 65%);
    animation-duration: 18s;
    transform-origin: 60% 70%;
  }
  .a2 {
    width: 60vw; height: 60vw;
    top: 10%; right: -15%;
    background: radial-gradient(circle at 50% 50%, rgba(56,189,248,.35), transparent 65%);
    animation-duration: 24s;
    animation-direction: reverse;
    transform-origin: 30% 60%;
  }
  .a3 {
    width: 55vw; height: 55vw;
    bottom: -20%; left: 20%;
    background: radial-gradient(circle at 50% 50%, rgba(244,114,182,.30), transparent 65%);
    animation-duration: 20s;
    transform-origin: 65% 30%;
  }
  .a4 {
    width: 40vw; height: 40vw;
    top: 35%; left: 35%;
    background: radial-gradient(circle at 50% 50%, rgba(52,211,153,.25), transparent 65%);
    animation-duration: 30s;
    animation-direction: reverse;
    transform-origin: 40% 60%;
  }

  @keyframes drift {
    0%   { transform: rotate(0deg) scale(1); }
    33%  { transform: rotate(120deg) scale(1.08); }
    66%  { transform: rotate(240deg) scale(.92); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* ── Stars ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 42%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 8%,  rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 28%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 60%, rgba(255,255,255,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 18%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 72%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 54% 88%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 45%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 7% 85%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 95%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 30%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 82% 80%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 57% 50%, rgba(255,255,255,.35) 0%, transparent 100%);
  }

  /* ── Layout ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(167,139,250,.4);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 13px;
    color: var(--accent);
    background: rgba(167,139,250,.10);
    margin-bottom: 32px;
    animation: fadeUp .6s .1s both;
    letter-spacing: .02em;
  }
  .badge::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .4; }
  }

  h1 {
    font-size: clamp(2.6rem, 7vw, 5.5rem);
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    animation: fadeUp .6s .2s both;
    max-width: 800px;
  }

  h1 .gradient {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--muted);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 48px;
    animation: fadeUp .6s .3s both;
  }

  .cta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp .6s .4s both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 15px 36px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: default;
    transition: transform .2s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 8px 32px rgba(167,139,250,.45);
  }
  .btn-primary:hover { box-shadow: 0 12px 40px rgba(167,139,250,.6); }

  .btn-ghost {
    background: rgba(240,234,248,.08);
    color: var(--text);
    border: 1px solid rgba(240,234,248,.2);
  }
  .btn-ghost:hover { background: rgba(240,234,248,.14); }

  /* ── Floating orbs (CSS only) ── */
  .orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    animation: floatOrb ease-in-out infinite alternate;
  }
  .orb1 {
    width: 8px; height: 8px;
    top: 20%; left: 15%;
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent);
    animation-duration: 4s;
  }
  .orb2 {
    width: 5px; height: 5px;
    top: 60%; right: 20%;
    background: var(--accent2);
    box-shadow: 0 0 12px var(--accent2);
    animation-duration: 5.5s;
    animation-delay: -2s;
  }
  .orb3 {
    width: 6px; height: 6px;
    bottom: 25%; left: 60%;
    background: var(--accent3);
    box-shadow: 0 0 14px var(--accent3);
    animation-duration: 3.5s;
    animation-delay: -1s;
  }
  .orb4 {
    width: 4px; height: 4px;
    top: 40%; left: 45%;
    background: rgba(52,211,153,1);
    box-shadow: 0 0 10px rgba(52,211,153,1);
    animation-duration: 6s;
    animation-delay: -3s;
  }

  @keyframes floatOrb {
    from { transform: translateY(0); }
    to   { transform: translateY(-20px); }
  }

  /* ── Metrics strip ── */
  .metrics {
    display: flex;
    gap: 48px;
    margin-top: 80px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp .6s .5s both;
  }
  .metric {
    text-align: center;
  }
  .metric .num {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .metric .label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .divider {
    width: 1px;
    background: rgba(240,234,248,.15);
    align-self: stretch;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Back link ── */
  .back {
    position: fixed;
    top: 18px;
    left: 22px;
    z-index: 10;
    font-size: 13px;
    color: rgba(240,234,248,.5);
    text-decoration: none;
    transition: color .15s;
  }
  .back:hover { color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    .aurora, .orb { animation: none; }
    .badge::before { animation: none; }
    .btn, h1, .sub, .cta-row, .metrics, .badge { animation: none; }
  }
</style>
</head>
<body>
  <a class="back" href="/">← deployhtml</a>

  <div class="aurora-wrap" aria-hidden="true">
    <div class="aurora a1"></div>
    <div class="aurora a2"></div>
    <div class="aurora a3"></div>
    <div class="aurora a4"></div>
  </div>

  <div class="stars" aria-hidden="true"></div>

  <div class="orbs" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
  </div>

  <main>
    <div class="badge">Now in public beta</div>

    <h1>Build things that<br><span class="gradient">glow in the dark</span></h1>

    <p class="sub">
      A pure CSS aurora hero — animated gradients, floating particles,
      and crisp typography. No JavaScript. No images. Just HTML and CSS.
    </p>

    <div class="cta-row">
      <span class="btn btn-primary">Get started →</span>
      <span class="btn btn-ghost">View docs</span>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="num">∞</div>
        <div class="label">Possibilities</div>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="metric">
        <div class="num">0</div>
        <div class="label">Dependencies</div>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="metric">
        <div class="num">100</div>
        <div class="label">Pure CSS</div>
      </div>
    </div>
  </main>
</body>
</html>
